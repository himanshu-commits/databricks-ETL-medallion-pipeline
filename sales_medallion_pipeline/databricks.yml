# This is a Databricks asset bundle definition for sales_medallion_pipeline.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: sales_medallion_pipeline
  uuid: 3ea0d5c2-1bc8-4b0a-907d-a295253d9a31

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-860d763f-761b.cloud.databricks.com
    variables:
      catalog: workspace
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-860d763f-761b.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/himanshutechwhiz@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/himanshutechwhiz@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: himanshutechwhiz@gmail.com
        level: CAN_MANAGE
